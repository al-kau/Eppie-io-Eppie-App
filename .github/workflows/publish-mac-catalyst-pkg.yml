---

name: "Publish MacOS"

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  workflow_call:

jobs:

  prepare:
    name: Prepare
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.publish-config.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Read the binaries publication configuration
        id: publish-config
        uses: finebits/github-actions/toolset/select-configuration@4a126d80a11c5fdc83ce884d3d23dffb30bc4495 # v2.0.0
        with:
          json-file: ./.github/configurations/publish-mac-catalyst-pkg.json
          keywords: "macos,all"

      - name: Check configs
        shell: bash
        run: |
          length=$( echo '${{ steps.publish-config.outputs.config-json }}' | jq '. | length' )

          if(( $length == 0 )); then
            echo "::error::No suitable publish configuration found"
            exit 1
          fi

  publish:
    name: Publish ${{ matrix.publish.framework }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    env:
      publish-path: './.publish/${{ matrix.publish.configuration }}/${{ matrix.publish.framework }}'
      artifacts-path: './.artifacts/${{ matrix.publish.configuration }}/${{ matrix.publish.framework }}'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Prerequisites
        uses: ./.github/actions/install-prerequisites
        with:
          uno-platform: true

      - name: Assign version
        id: assign-version
        uses: ./.github/actions/assign-version

      - uses: finebits/github-actions/toolset/file/replace-text@4a126d80a11c5fdc83ce884d3d23dffb30bc4495 # v2.0.0
        with:
          file: ./src/Eppie.App/Eppie.App.Shared/Authorization/AuthConfig.Uno.cs
          find-what: '\"<Gmail-ClientId>\"'
          replace-with: "${{ secrets.GMAIL_CLIENT_ID }}"

      - uses: finebits/github-actions/toolset/file/replace-text@4a126d80a11c5fdc83ce884d3d23dffb30bc4495 # v2.0.0
        with:
          file: ./src/Eppie.App/Eppie.App.Shared/Authorization/AuthConfig.Uno.cs
          find-what: '\"<Gmail-ClientSecret>\"'
          replace-with: "${{ secrets.GMAIL_CLIENT_SECRET }}"

      - uses: finebits/github-actions/toolset/file/replace-text@4a126d80a11c5fdc83ce884d3d23dffb30bc4495 # v2.0.0
        with:
          file: ./src/Eppie.App/Eppie.App.Shared/Authorization/AuthConfig.Uno.cs
          find-what: '\"<Outlook-ClientId>\"'
          replace-with: "${{ secrets.OUTLOOK_CLIENT_ID }}"

      - name: Prepare
        if: matrix.publish.tool == 'dotnet'
        shell: bash
        run: |
          semantic_version='${{ steps.assign-version.outputs.semantic-version }}'
          numeric_version='${{ steps.assign-version.outputs.numeric-version }}'

          project='${{ matrix.publish.project }}'
          configuration='${{ matrix.publish.configuration }}'
          framework='${{ matrix.publish.framework }}'
          publish_path='${{ env.publish-path }}'

          prepare='${{ join(matrix.publish.prepare, '|') }}'

          IFS_CACHE=$IFS
          IFS='|'

          options="--configuration=$configuration --framework=$framework --property:Version=\"$semantic_version\" --property:AssemblyVersion=\"$numeric_version\" --property:PackageVersion=\"$numeric_version\""
          for prepare_options in $prepare
          do
            echo "$prepare_options $options" | xargs dotnet build $project
          done

          IFS=$IFS_CACHE

      - name: Publish Mac Catalyst
        if: matrix.publish.tool == 'dotnet'
        shell: bash
        run: |
          semantic_version='${{ steps.assign-version.outputs.semantic-version }}'
          numeric_version='${{ steps.assign-version.outputs.numeric-version }}'

          project='${{ matrix.publish.project }}'
          configuration='${{ matrix.publish.configuration }}'
          framework='${{ matrix.publish.framework }}'
          publish_path='${{ env.publish-path }}'
          extra_options='${{ matrix.publish.extra }}'

          echo "[$publish_path]"

          mkdir -p "${publish_path}"
          ls "./.publish" -alR

          pwd

          options="--output=$publish_path --configuration=$configuration --framework=$framework --property:Version=\"$semantic_version\" --property:AssemblyVersion=\"$numeric_version\""
          echo "$options  $extra_options" | xargs dotnet publish $project 

          pwd

          rm -rf "$publish_path/*.pdb"

          ls "./.publish" -alR

      - name: Prepare Artifacts
        shell: bash
        run: |
          artifact_path="${{ env.artifacts-path }}"
          publish_path="${{ env.publish-path }}"
          tool='${{ matrix.artifact.tool }}'

          echo "[$publish_path]"

          pwd

          mkdir -p "${artifact_path}"

          ls "./.publish" -alR

          if [[ "$tool" == "cp" ]]; then
            cp -r "${publish_path}/*" "$artifact_path" && echo "Copying of the artifact has been completed successfully." || echo "::warning::Failed to copy artifact"
          else
            echo "::warning::Unknown artifact tool: '$tool'"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: Eppie.MacCatalyst [${{ steps.assign-version.outputs.semantic-version }}]
          path: ${{ env.artifacts-path }}
