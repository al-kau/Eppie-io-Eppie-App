---

name: "Xaml Style Check"

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main
      - release/**

jobs:

  style-check:

    runs-on: ubuntu-latest

    env:
      global-json-file: src/Eppie.App/global.json

      ignore: "*/bin/*;*/obj/*"
      root: src/Eppie.App/
      xaml-styler-config: src/Eppie.App/Settings.XamlStyler

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@6bd8b7f7774af54e05809fcc5431931b3eb1ddee # v4.0.1
        with:
            global-json-file: ${{ env.global-json-file }}

      - name: Install XamlStyler tool
        shell: bash
        run: dotnet tool install --global XamlStyler.Console

      - name: Verify style
        shell: bash
        run: bash "./.github/actions/xaml-style-check/process.sh" "${{ env.ignore }}" "${{ env.root }}" "${{ env.xaml-styler-config }}"
